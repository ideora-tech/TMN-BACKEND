services:

  # ── MySQL 8 ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: tmn_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: tmn_transport
      MYSQL_USER: hruser
      MYSQL_PASSWORD: hrpassword123
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Laravel Backend (port 4019) ───────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: TMN-BACKEND
    restart: unless-stopped
    ports:
      - "4019:4019"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:4019
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: tmn_transport
      DB_USERNAME: hruser
      DB_PASSWORD: hrpassword123
    volumes:
      - backend_storage:/var/www/html/storage/app/public
      - backend_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy

  # ── Next.js Frontend (port 3009) ──────────────────────────────────────────
  frontend:
    build:
      context: ../TMN-TRANSPORT-FRONTEND
      dockerfile: Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://backend:4019
    container_name: TMN-FRONTEND
    restart: unless-stopped
    ports:
      - "3009:3009"
    environment:
      NODE_ENV: production
      PORT: 3009
      BACKEND_URL: http://backend:4019
      NEXTAUTH_URL: http://localhost:3009
      AUTH_SECRET: tmntransport2026secretkey32chars!!
      AUTH_TRUST_HOST: "true"
    depends_on:
      - backend

volumes:
  mysql_data:
    name: tmn_mysql_data
  backend_storage:
    name: tmn_backend_storage
  backend_logs:
    name: tmn_backend_logs
